<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>صفحه پیدا نشد | محمدجواد عرفانی</title>
  <meta name="robots" content="noindex, nofollow">

  <style>
    @font-face{font-family:Vazirmatn;src:url("/assets/vazirmatn-arabic.woff2") format("woff2");font-display:swap}
    *{box-sizing:border-box}body{margin:0;min-height:100svh;display:grid;place-items:center;padding:24px;background:#080706;color:#f5f0e5;font-family:Vazirmatn,Tahoma,sans-serif;text-align:center}

  </style>
</head>
<body>
  <main>
    <small>ERROR / 404</small>
    <strong aria-hidden="true">404</strong>
    <h1>این صفحه پیدا نشد.</h1>
